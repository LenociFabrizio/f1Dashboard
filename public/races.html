<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario · Lega F1</title>
  <meta name="description" content="Il calendario completo della stagione della Lega F1 25: circuiti, date, meteo e risultati di ogni Gran Premio.">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,600;0,700;0,900;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div id="app-loader"><div class="loader-mark">LEGA<span>F1</span></div><div class="loader-bar"><i></i></div></div>
  <div id="navbar-mount"></div>

  <main class="page container">
    <div class="page-head">
      <div class="eyebrow">Stagione <span id="season-label"></span></div>
      <h1>Calendario</h1>
      <p class="lead">Tutti i Gran Premi della stagione: circuiti, date, meteo e risultati. Per ogni gara trovi anche gli assetti consigliati.</p>
    </div>

    <div class="flex justify-between items-center wrap gap-3" style="margin-bottom:24px">
      <div class="segmented" id="filter">
        <button class="active" data-f="all">Tutte</button>
        <button data-f="completed">Concluse</button>
        <button data-f="scheduled">In programma</button>
      </div>
      <div class="text-lo" id="count-label"></div>
    </div>

    <div class="grid grid-auto stagger" id="races-grid"></div>
  </main>

  <div id="footer-mount"></div>
  <script type="module" src="/js/pages/races.js"></script>
</body>
</html>
