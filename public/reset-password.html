<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimposta password · Lega F1</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,600;0,700;0,900;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-visual">
      <div class="av-content anim-fade-up">
        <a href="/index.html" class="brand" style="margin-bottom:24px"><span class="brand-mark">F1</span><span>LEGA<span class="accent">F1</span></span></a>
        <h1>Nuova <span class="text-red">password.</span></h1>
        <p class="lead" style="max-width:34ch">Scegli una nuova password per il tuo account e torna subito in pista.</p>
      </div>
    </aside>

    <section class="auth-panel">
      <div class="auth-card anim-fade-up">
        <h2 style="margin-bottom:4px">Reimposta password</h2>
        <p class="text-lo" style="margin-bottom:24px">Inserisci la tua nuova password.</p>

        <form id="reset-form" novalidate>
          <div class="field">
            <label>Nuova password</label>
            <input class="input" type="password" name="password" autocomplete="new-password" placeholder="••••••••" minlength="6" required>
            <div class="err">Minimo 6 caratteri.</div>
          </div>
          <div class="field">
            <label>Conferma password</label>
            <input class="input" type="password" name="password2" autocomplete="new-password" placeholder="••••••••" required>
            <div class="err">Le password non coincidono.</div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Reimposta password</button>
        </form>

        <p class="text-lo text-center" style="margin-top:22px;font-size:0.9rem">
          <a href="/login.html" class="text-red" style="font-weight:700">Torna all'accesso</a>
        </p>
      </div>
    </section>
  </div>

  <script type="module" src="/js/pages/reset-password.js"></script>
</body>
</html>
